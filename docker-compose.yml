services:
  ips_santa_fe:
    build: .
    container_name: ips_santa_fe_mock
    environment:
      IPS_NAME: "Fundación Santa Fe de Bogotá"
      IPS_SLUG: "fundacion-santa-fe"
      IPS_CODE: "IPS-FSF"
      IPS_NIT: "860032640-1"
      TIMEZONE: "America/Bogota"
      PORT: 4011
      API_KEY: "ips-fsf-key"
      DB_PATH: "/data/ips.db"
      RESET_DB_ON_STARTUP: "true"
      SUPABASE_URL: "http://host.docker.internal:54321"
      SUPABASE_JWT_SECRET: "dev-smart-secret-32-bytes-minimum!!"
      SMART_AUDIENCE: "authenticated"
      SMART_ISSUER: "http://host.docker.internal:54321/auth/v1"
      SMART_PATIENT_CLAIM: "patient_id"
    ports:
      - "4011:4011"
    volumes:
      - ./data/ips-fsf:/data
    networks:
      - medix_net

